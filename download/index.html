  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var manual = (params.get("lang") || "").toLowerCase();
      var target = manual;

      if (!target) {
        var browserLang = (navigator.language || "").toLowerCase();
        if (browserLang.indexOf("ja") === 0) {
          target = "ja";
        } else if (browserLang.indexOf("en") === 0) {
          target = "en";
        } else {
          target = "zh";
        }
      }

      if (target === "en") {
        window.location.replace("./en/");
        return;
      }
      if (target === "ja") {
        window.location.replace("./ja/");
      }
    }());

  <style>
    :root {
      color-scheme: light;
      --bg: #f6f1e9;

      --line: rgba(160, 141, 120, 0.14);

    * { box-sizing: border-box; }

    html {

      background-color: var(--bg);
      background:

    }

    body {

      min-height: 100vh;
      font-family: "SF Pro Text", "PingFang SC", "Helvetica Neue", sans-serif;
      color: var(--text);
      line-height: 1.6;
      overflow-x: hidden;
      background-color: var(--bg);
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      border-radius: 999px;
      border: 1px solid rgba(157, 137, 114, 0.14);
      pointer-events: none;
      z-index: -1;
    }

    body::before {
      top: calc(env(safe-area-inset-top) + 26px);
      width: min(88vw, 560px);
      height: min(88vw, 560px);
    }

    body::after {
      top: -18px;
      width: min(118vw, 780px);
      height: min(118vw, 780px);
      opacity: 0.72;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    img {

      max-width: 100%;
    }

    .page {
      width: var(--container);
      margin: 0 auto;

      margin-bottom: 16px;
    }

    .brand {

    .brand-mark {

      height: 40px;
      border-radius: 14px;
      background: linear-gradient(180deg, rgba(164, 145, 123, 0.94), rgba(128, 107, 87, 0.96));

      position: relative;
      flex: 0 0 auto;
    }

    .brand-mark::before {
      content: "";
      position: absolute;
      inset: 10px;
      border-radius: 999px;
      border: 2px solid rgba(255, 248, 240, 0.92);
    }

    .brand-copy strong {

      font-size: 15px;

    .brand-copy span {

    .lang-switch {

      gap: 4px;
      padding: 4px;
      border-radius: 999px;

    .quote {

      letter-spacing: 0.08em;

    .highlights {

    .highlight {

    @media (prefers-reduced-motion: reduce) {

  </style>
