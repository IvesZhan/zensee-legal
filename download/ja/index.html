<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ZenSee をダウンロード</title>
  <meta name="description" content="ZenSee は静かに続けられる禅修・瞑想アプリです。ダウンロードして、毎日の練習を始めましょう。" />
  <meta name="theme-color" content="#f6f1e9" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="ZenSee をダウンロード" />
  <meta property="og:description" content="天地を見て、人々を見て、自分を見る。ZenSee で静かな毎日を始めましょう。" />
  <meta property="og:url" content="https://iveszhan.github.io/zensee-legal/download/ja/" />
  <meta property="og:image" content="https://iveszhan.github.io/zensee-legal/IMG_2399.PNG" />
  <meta name="twitter:card" content="summary_large_image" />
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f1e9;
      --text: #514335;
      --muted: #8f7d6d;
      --line: rgba(160, 141, 120, 0.14);
      --accent: #9d8972;
      --accent-strong: #7e6b58;
      --shadow: 0 20px 42px rgba(118, 99, 78, 0.12);
      --container: min(100% - 24px, 460px);
    }

    * { box-sizing: border-box; }

    html {
      min-height: 100%;
      background-color: var(--bg);
      background:
        radial-gradient(circle at 50% 0%, rgba(232, 222, 209, 0.78), transparent 42%),
        linear-gradient(180deg, #fbf7f1 0%, #f6f1e9 48%, #f2ece4 100%);
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
      color: var(--text);
      line-height: 1.6;
      overflow-x: hidden;
      background-color: var(--bg);
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      border-radius: 999px;
      border: 1px solid rgba(157, 137, 114, 0.14);
      pointer-events: none;
      z-index: -1;
    }

    body::before {
      top: calc(env(safe-area-inset-top) + 26px);
      width: min(88vw, 560px);
      height: min(88vw, 560px);
    }

    body::after {
      top: -18px;
      width: min(118vw, 780px);
      height: min(118vw, 780px);
      opacity: 0.72;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    img {
      display: block;
      max-width: 100%;
    }

    .page {
      width: var(--container);
      margin: 0 auto;
      padding: calc(env(safe-area-inset-top) + 18px) 0 calc(env(safe-area-inset-bottom) + 118px);
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .brand-mark {
      width: 40px;
      height: 40px;
      border-radius: 14px;
      background: linear-gradient(180deg, rgba(164, 145, 123, 0.94), rgba(128, 107, 87, 0.96));
      box-shadow: 0 10px 20px rgba(126, 107, 87, 0.2);
      position: relative;
      flex: 0 0 auto;
    }

    .brand-mark::before {
      content: "";
      position: absolute;
      inset: 10px;
      border-radius: 999px;
      border: 2px solid rgba(255, 248, 240, 0.92);
    }

    .brand-copy strong {
      display: block;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.01em;
    }

    .brand-copy span {
      display: block;
      color: var(--muted);
      font-size: 12px;
    }

    .lang-switch {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px;
      border-radius: 999px;
      background: rgba(255, 252, 247, 0.72);
      border: 1px solid var(--line);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      flex: 0 0 auto;
    }

    .lang-switch a {
      min-width: 42px;
      padding: 8px 10px;
      border-radius: 999px;
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    .lang-switch a.active {
      background: rgba(255, 252, 247, 0.98);
      color: var(--accent-strong);
      box-shadow: 0 8px 16px rgba(126, 107, 87, 0.08);
    }

    .hero {
      text-align: center;
    }

    h1 {
      margin: 10px 0 10px;
      font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
      font-size: clamp(27px, 7.2vw, 38px);
      line-height: 1.18;
      letter-spacing: -0.02em;
    }

    .summary {
      margin: 0 auto;
      max-width: 22rem;
      color: var(--muted);
      font-size: 14px;
    }

    .screens {
      position: relative;
      width: min(100%, 314px);
      height: 274px;
      margin: 18px auto 0;
    }

    .aura {
      position: absolute;
      inset: 54px 18px 0;
      background: radial-gradient(circle, rgba(157, 137, 114, 0.22), rgba(157, 137, 114, 0) 74%);
      filter: blur(8px);
    }

    .shot {
      position: absolute;
      width: 45%;
      min-width: 138px;
      border-radius: 26px;
      overflow: hidden;
      background: #f8f3ed;
      border: 1px solid rgba(157, 137, 114, 0.16);
      box-shadow: var(--shadow);
    }

    .shot.one {
      left: 10px;
      top: 0;
      transform: rotate(-6deg);
    }

    .shot.two {
      right: 10px;
      top: 62px;
      transform: rotate(6deg);
    }

    .quote {
      margin: 14px auto 0;
      max-width: 16rem;
      color: var(--accent-strong);
      font-size: 12px;
      letter-spacing: 0.04em;
    }

    .highlights {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-top: 20px;
    }

    .highlight {
      padding: 12px 8px;
      border-radius: 20px;
      background: rgba(255, 252, 247, 0.66);
      border: 1px solid var(--line);
      text-align: center;
      box-shadow: 0 10px 20px rgba(118, 99, 78, 0.06);
    }

    .highlight strong {
      display: block;
      font-size: 14px;
      font-weight: 700;
      color: var(--accent-strong);
    }

    .highlight span {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
    }

    .links {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 12px 16px;
      margin-top: 24px;
      color: var(--muted);
      font-size: 13px;
    }

    .links a {
      text-decoration: underline;
      text-decoration-color: rgba(143, 125, 109, 0.3);
      text-underline-offset: 3px;
    }

    .floating-download {
      position: fixed;
      left: 12px;
      right: 12px;
      bottom: calc(env(safe-area-inset-bottom) + 12px);
      z-index: 20;
      padding: 10px;
      border-radius: 999px;
      background: rgba(255, 252, 247, 0.82);
      border: 1px solid var(--line);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      box-shadow: 0 16px 34px rgba(118, 99, 78, 0.12);
    }

    .download-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 56px;
      padding: 14px 18px;
      border-radius: 999px;
      background: linear-gradient(180deg, #9d8972 0%, #7e6b58 100%);
      color: #fbf7f1;
      font-size: 16px;
      font-weight: 700;
      box-shadow: 0 16px 28px rgba(126, 107, 87, 0.22);
    }

    @media (min-width: 700px) {
      :root {
        --container: min(100% - 32px, 900px);
      }

      .page {
        padding-top: calc(env(safe-area-inset-top) + 28px);
      }

      .hero {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(320px, 380px);
        gap: 24px;
        align-items: center;
        text-align: left;
      }

      .summary,
      .quote {
        margin-left: 0;
      }

      .screens {
        width: 360px;
        height: 314px;
        margin-top: 0;
      }

      .floating-download {
        left: 50%;
        right: auto;
        width: min(100% - 32px, 520px);
        transform: translateX(-50%);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        transition: none !important;
        animation: none !important;
        scroll-behavior: auto !important;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="topbar">

        <div class="brand-copy">

    <div class="links">

  </main>

  <div class="floating-download">
    <a class="download-button" data-download-button href="https://iveszhan.github.io/zensee-legal/support/ja/">ダウンロードへ</a>

  <script src="../config.js"></script>
  <script src="../app.js"></script>
</body>
</html>
