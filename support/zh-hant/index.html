    :root {

      --accent: #8e8071;

    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      color: var(--text);
    }
    h2 {
      margin-top: 28px;
      margin-bottom: 8px;
      font-size: 19px;
      color: var(--accent);
    }
    p, li { font-size: 15px; }
    a { color: var(--accent); }
    ul { margin-top: 6px; padding-left: 20px; }
    .meta {
      color: var(--subtle);
      margin-bottom: 18px;

    .footer {
